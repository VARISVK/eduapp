<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flox | Premium Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="googlebot" content="noindex, nofollow">
</head>
<body>
    <div id="app">
        <!-- Onboarding View -->
        <section id="onboarding-view" class="view active">
            <div class="card glass">

                <h1 class="title">Flox</h1>
                <p class="subtitle" id="onboarding-subtitle">Ace your taxation exam with a companion.</p>
                <form id="onboarding-form">
                    <div class="form-grid">
                        <div class="field signup-only">
                            <label for="username">Your Name</label>
                            <input type="text" id="username" placeholder="Enter your name" required>
                        </div>
                        <div class="field" id="identifier-field">
                            <label for="gmail" id="identifier-label">Gmail ID</label>
                            <input type="text" id="gmail" placeholder="e.g. name@gmail.com or mobile" required>
                        </div>
                        <div class="field signup-only">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" placeholder="e.g. +44... (including country code)" required>
                        </div>
                        <div class="field signup-only">
                            <label for="current-paper">Current ACCA Paper</label>
                            <select id="current-paper" required>
                                <option value="" disabled selected>Select paper</option>
                                <option value="BT">Business and Technology (BT)</option>
                                <option value="MA">Management Accounting (MA)</option>
                                <option value="FA">Financial Accounting (FA)</option>
                                <option value="LW">Corporate and Business Law (LW)</option>
                                <option value="PM">Performance Management (PM)</option>
                                <option value="TX">Taxation (TX)</option>
                                <option value="FR">Financial Reporting (FR)</option>
                                <option value="AA">Audit and Assurance (AA)</option>
                                <option value="FM">Financial Management (FM)</option>
                                <option value="PM">Performance Management (PM)</option>
                                <option value="APM">Advanced Performance Management (APM)</option>
                                <option value="AFM">Advanced Financial Management (AFM)</option>
                                <option value="SBR">Strategic Business Reporting (SBR)</option>
                                <option value="SBL">Strategic Business Leader (SBL)</option>
                            </select>
                        </div>
                        <div class="field signup-only">
                            <label for="last-score">Last Paper Score (%)</label>
                            <input type="number" id="last-score" value="0" min="0" max="100">
                        </div>
                        <div class="field signup-only">
                            <label for="institute">Institute Name</label>
                            <input type="text" id="institute" placeholder="Enter institute" required>
                        </div>
                        <!-- Temporarily hidden gender field
                        <div class="field">
                            <label>Your Gender</label>
                            <div class="gender-options">
                                <label class="gender-radio">
                                    <input type="radio" name="gender" value="male" required>
                                    <span>Male</span>
                                </label>
                                <label class="gender-radio">
                                    <input type="radio" name="gender" value="female">
                                    <span>Female</span>
                                </label>
                            </div>
                        </div>
                        -->
                    </div>
                    <div id="auth-error" class="error-msg" style="display: none;"></div>
                    <button type="submit" class="btn primary" id="auth-submit">Find a Buddy</button>
                    <div class="auth-toggle">
                        <span id="toggle-text">Already have an account?</span>
                        <a href="#" id="toggle-link">Login</a>
                    </div>
                </form>
            </div>
        </section>

        <!-- Matchmaking View -->
        <section id="matchmaking-view" class="view">
            <div class="card matchmaking-card">
                <div class="radar-container">
                    <div class="radar"></div>
                    <div class="user-ping"></div>
                </div>
                <h2>Finding your study buddy...</h2>
                <p id="matchmaking-subtitle">Matching you with a taxation expert.</p>
            </div>
        </section>

        <!-- Quiz View -->
        <section id="quiz-view" class="view">
            <header class="quiz-header">
                <div class="header-main">
                    <div class="progress-container">
                        <div class="progress-bar" id="progress-bar"></div>
                        <span id="question-counter">Question 1/30</span>
                    </div>
                    <div class="header-scores">
                        <div class="score-badge user">
                            <span class="label">YOU</span>
                            <span class="val" id="user-score-header">0</span>
                        </div>
                        <div class="score-badge buddy">
                            <span class="label">BUDDY</span>
                            <span class="val" id="buddy-score-header">0</span>
                        </div>
                    </div>
                </div>
                <div class="timer-container" id="timer-container">
                    <svg class="timer-svg" viewBox="0 0 100 100">
                        <circle class="timer-bg" cx="50" cy="50" r="45"></circle>
                        <circle class="timer-progress" cx="50" cy="50" r="45" id="timer-circle"></circle>
                    </svg>
                    <span id="timer-text">30</span>
                </div>
                <button id="logout-btn" class="icon-btn logout-btn" title="Exit Quiz">
                    <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                </button>
            </header>

            <main class="quiz-main">
                <div id="question-container" class="question-container">
                    <!-- Questions will be injected here -->
                </div>

                <aside class="buddy-sidebar">
                    <div class="card leaderboard-card">
                        <h3 class="sidebar-title">Study Room</h3>
                        <div id="competitors-list" class="competitors-list">
                            <!-- Competitors will follow here -->
                        </div>
                    </div>
                </aside>
            </main>
        </section>

        <!-- Results View -->
        <section id="results-view" class="view">
            <div class="card results-card">
                <h1>Quiz Completed!</h1>
                <div class="leaderboard" id="final-leaderboard">
                    <!-- Results will be injected here -->
                </div>
                <button class="btn secondary" onclick="window.location.reload()">Try Again</button>
            </div>
        </section>
    </div>

    <!-- Voice Chat Assets -->
    <audio id="remote-audio" autoplay></audio>

    <div id="voice-controls" class="voice-controls-pill glass" style="display: none;">
        <div class="voice-status">
            <div class="voice-indicator" id="local-voice-indicator">
                <svg viewBox="0 0 24 24" class="mic-icon"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </div>
            <span id="voice-label">Voice Connected</span>
        </div>
        <button id="mute-btn" class="mute-btn">
            <svg viewBox="0 0 24 24" id="mic-on-icon"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            <svg viewBox="0 0 24 24" id="mic-off-icon" style="display: none;"><path d="M19 11h-1.7c0 .74-.16 1.43-.43 2.05l1.23 1.23c.56-.98.9-2.09.9-3.28zm-4.02.17c0-.06.02-.11.02-.17V5c0-1.66-1.34-3-3-3S9 3.34 9 5v.18l5.98 5.99zM4.27 3L3 4.27l6.01 6.01V11c0 1.66 1.33 3 2.99 3 .22 0 .44-.03.65-.08l1.66 1.66c-.71.33-1.5.52-2.31.52-2.76 0-5.3-2.1-5.3-5.1H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c.91-.13 1.77-.45 2.54-.9L19.73 21 21 19.73 4.27 3z"/></svg>
        </button>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
